version: "3.8"

services:
  qdrant:
    image: qdrant/qdrant:latest
    container_name: ziva-qdrant
    restart: unless-stopped
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    networks:
      - ziva-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6333/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  searxng:
    image: searxng/searxng:latest
    container_name: ziva-searxng
    restart: unless-stopped
    ports:
      - "8080:8080"
    volumes:
      - searxng_data:/etc/searxng
    environment:
      - SEARXNG_BASE_URL=http://localhost:8080/
    networks:
      - ziva-net
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - SETGID
      - SETUID

  kiwix:
    image: kiwix/kiwix-serve:latest
    container_name: ziva-kiwix
    restart: unless-stopped
    ports:
      - "8081:8081"
    volumes:
      - kiwix_data:/data
    command: --port=8081 *.zim
    networks:
      - ziva-net

  browserless:
    image: browserless/chrome:latest
    container_name: ziva-browserless
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - CONNECTION_TIMEOUT=60000
      - MAX_CONCURRENT_SESSIONS=3
    networks:
      - ziva-net

  open-webui:
    image: ghcr.io/open-webui/open-webui:main
    container_name: ziva-openwebui
    restart: unless-stopped
    ports:
      - "3001:8080"
    volumes:
      - openwebui_data:/app/backend/data
    environment:
      - OLLAMA_BASE_URL=http://host.docker.internal:11434
      - WEBUI_SECRET_KEY=
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - ziva-net
    depends_on:
      - qdrant
      - searxng

networks:
  ziva-net:
    driver: bridge

volumes:
  qdrant_data:
  searxng_data:
  kiwix_data:
  openwebui_data:
