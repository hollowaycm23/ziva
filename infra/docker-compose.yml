version: '3'

services:
  searxng:
    container_name: searxng
    image: searxng/searxng:latest
    networks:
      - searxng
    ports:
      - "8080:8080"
    volumes:
      - ./searxng:/etc/searxng:rw
    environment:
      - SEARXNG_BASE_URL=http://localhost:8080/
    restart: always

  qdrant:
    image: qdrant/qdrant
    container_name: ziva-qdrant
    ports:
      - "6333:6333"
    volumes:
      - ../qdrant_storage:/qdrant/storage
    networks:
      - searxng
    restart: always

networks:
  searxng:
    driver: bridge
