syntax = "proto3";

package zivabrain;

service BrainService {
  // Sends a text prompt and receives a generated text response
  rpc Generate (GenerateRequest) returns (GenerateResponse) {}
  
  // Streaming version for real-time output
  rpc GenerateStream (GenerateRequest) returns (stream GenerateResponse) {}
}

message GenerateRequest {
  string prompt = 1;
  float temperature = 2;
  int32 max_tokens = 3;
  repeated string stop_sequences = 4;
}

message GenerateResponse {
  string text = 1;
  int32 token_usage = 2;
  bool finished = 3;
}
