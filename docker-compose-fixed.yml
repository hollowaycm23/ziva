version: '3.8'

services:
  # ===== LLM PROVIDER =====
  # Choose ONE backend below and set ZIVA_LLM_BACKEND in .env accordingly
  
  # OPTION A: Ollama (local, in Docker)
  ollama:
    image: ollama/ollama:latest
    container_name: ziva-ollama
    networks:
      - ziva-net
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    environment:
      - OLLAMA_HOST=0.0.0.0:11434
    restart: always

  # ===== CORE SERVICES =====
  
  ziva-core:
    build: .
    container_name: ziva-core
    entrypoint: /app/scripts/start_docker.sh
    networks:
      - ziva-net
    ports:
      - "8000:8000" # API
      - "9000:9000" # P2P
    volumes:
      - ./logs:/app/logs
      - ./db:/app/db
      - ./brain:/app/brain
      - ./data:/app/data
      - ./inbox:/app/inbox
      - ./outbox:/app/outbox
      - ./core:/app/core
      - ./api:/app/api
      - ./network:/app/network
      - ./scripts:/app/scripts
      - ./agent:/app/agent
      - ./extensions:/app/extensions
      - ./ziva.yaml:/app/ziva.yaml
    env_file:
      - .env
    environment:
      - PYTHONPATH=/app
      - ZIVA_VERBOSE=${ZIVA_VERBOSE:-true}
      - ZIVA_LLM_BACKEND=${ZIVA_LLM_BACKEND:-ollama}
      - ZIVA_LLM_BASE_URL=${ZIVA_LLM_BASE_URL:-http://ollama:11434/v1}
      - ZIVA_LLM_MODEL=${ZIVA_LLM_MODEL:-qwen3:14b}
      - ZIVA_LLM_KEY=${ZIVA_LLM_KEY:-}
      - MODEL_NAME=${MODEL_NAME:-qwen3:14b}
      - QDRANT_URL=${QDRANT_URL:-http://qdrant:6333}
      - PLAYWRIGHT_WS_ENDPOINT=${PLAYWRIGHT_WS_ENDPOINT:-ws://ziva-browser:3000}
    depends_on:
      qdrant:
        condition: service_started
      ollama:
        condition: service_started
    restart: unless-stopped

  qdrant:
    image: qdrant/qdrant:latest
    container_name: ziva-qdrant
    networks:
      - ziva-net
    ports:
      - "6333:6333"
    volumes:
      - qdrant_data:/qdrant/storage
    restart: unless-stopped

  searxng:
    image: searxng/searxng:latest
    container_name: ziva-searxng
    networks:
      - ziva-net
    ports:
      - "8082:8080"
    environment:
      - SEARXNG_SECRET_KEY=${SEARXNG_SECRET_KEY}
      - SEARXNG_BASE_URL=http://localhost:8082/
    volumes:
      - searxng_data:/data
      - ./searxng_settings.yml:/etc/searxng/settings.yml
    restart: unless-stopped

  kiwix:
    image: ghcr.io/kiwix/kiwix-serve:latest
    container_name: ziva-kiwix
    networks:
      - ziva-net
    ports:
      - "8081:8080"
    volumes:
      - kiwix_data:/data
    environment:
      - KIWIX_SERVER_PORT=8080
    # Download Wikipedia or serve from /data/*.zim if exists
    entrypoint: >
      sh -c "
        if [ ! -f /data/*.zim ]; then
          echo 'No ZIM files found in /data. Starting empty server...'
        fi &&
        ls /data/*.zim 2>/dev/null | head -1 | xargs -r kiwix-serve
      "
    restart: unless-stopped

  open-webui:
    image: ghcr.io/open-webui/open-webui:main
    container_name: ziva-openwebui
    ports:
      - "3000:8080"
    networks:
      - ziva-net
    volumes:
      - open-webui-data:/app/backend/data
    environment:
      - OPENAI_API_BASE_URL=http://ziva-core:8000/v1
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - OLLAMA_BASE_URL=
      - WEBUI_SECRET_KEY=${WEBUI_SECRET_KEY}
      - WEBUI_AUTH=False
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      - ziva-core
    restart: unless-stopped

  # ===== LETTA MEMORY SYSTEM =====
  
  letta-db:
    image: pgvector/pgvector:pg16
    container_name: ziva-letta-db
    networks:
      - ziva-net
    environment:
      POSTGRES_PASSWORD: ${LETTA_DB_PASSWORD}
      POSTGRES_USER: ${LETTA_DB_USER:-letta_user}
      POSTGRES_DB: ${LETTA_DB_NAME:-lettadb}
    ports:
      - "5432:5432"
    volumes:
      - letta_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${LETTA_DB_USER:-letta_user}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  letta-server:
    image: lettaai/letta:latest
    container_name: ziva-letta-server
    networks:
      - ziva-net
    environment:
      - LETTA_STORAGE_TYPE=sqlite
      - LETTA_RECALL_STORAGE_TYPE=sqlite
      - LETTA_ARCHIVAL_STORAGE_TYPE=sqlite
      - LETTA_METADATA_STORAGE_TYPE=sqlite
      - OPENAI_API_BASE=${ZIVA_LLM_BASE_URL:-http://ollama:11434/v1}
      - OPENAI_API_KEY=${ZIVA_LLM_KEY:-}
      - LETTA_LLM_MODEL=${ZIVA_LLM_MODEL:-qwen3:14b}
      - LETTA_LLM_ENDPOINT=${ZIVA_LLM_BASE_URL:-http://ollama:11434/v1}
      - LETTA_LLM_ENDPOINT_TYPE=openai
    volumes:
      - ./ziva.yaml:/app/ziva.yaml
      - letta_data:/root/.letta
    ports:
      - "8283:8283"
    depends_on:
      letta-db:
        condition: service_healthy
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped

  # ===== BROWSER AUTOMATION =====
  
  ziva-browser:
    image: browserless/chrome:latest
    container_name: ziva-browser
    networks:
      - ziva-net
    ports:
      - "3001:3000"
    environment:
      - MAX_CONCURRENT_SESSIONS=5
      - MAX_QUEUE_LENGTH=10
      - PREBOOT_CHROME=true
      - KEEP_ALIVE=true
      - CONNECTION_TIMEOUT=30000
      - CHROME_LAUNCH_ARGS=--no-sandbox,--disable-gpu
    restart: unless-stopped

volumes:
  ollama_data:
  qdrant_data:
  searxng_data:
  kiwix_data:
  open-webui-data:
  letta_pg_data:
  letta_data:

networks:
  ziva-net:
    driver: bridge
